# Основной прокси-сервер 
user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Формат логов
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # Базовые настройки
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100M;
    server_tokens off;

    # Сжатие
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types 
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Ограничение частоты запросов (по IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=20r/s;

    # Группы серверов
    upstream backend {
        server backend:8000;      # Django приложение
        keepalive 32;             # постоянные соединения
    }

    upstream frontend {
        server frontend:80;        # Nginx с Vue SPA
        keepalive 32;
    }

    # ========== HTTP -> HTTPS ==========
    server {
        listen 80;
        server_name monitoring-vsosh.ru www.monitoring-vsosh.ru;

        # Проверка здоровья для Docker (всегда доступен)
        location /health/ {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache, no-store, must-revalidate";  
        }

        # Let's Encrypt подтверждение
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное на HTTPS
        location / {
            return 301 https://$server_name$request_uri;
        }
    }

    # ========== HTTPS ==========
    server {
        listen 443 ssl http2;
        server_name monitoring-vsosh.ru www.monitoring-vsosh.ru;

        # SSL сертификаты Let's Encrypt
        ssl_certificate /etc/letsencrypt/live/monitoring-vsosh.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/monitoring-vsosh.ru/privkey.pem;

        # Современные протоколы SSL
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 10m;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # Проверка сертификатов OCSP
        ssl_stapling on;
        ssl_stapling_verify on;

        # Заголовки безопасности
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

       # Проверка здоровья для Docker
        location /health/ {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Статика Django (собранная collectstatic)
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Медиа Django (загруженные файлы)
        location /media/ {
            alias /app/media/;
            expires 1M;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # API авторизации (списки пользователей, сессии, регистрация)
        location /api/auth/ {
            limit_req zone=auth burst=100 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;

            # Буферы для списков пользователей и сессий
            proxy_buffer_size 16k;
            proxy_buffers 32 16k;
            proxy_busy_buffers_size 32k;
            proxy_max_temp_file_size 512m;
        }

        # Основное API (большие данные, экспорт)
        location /api/ {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;

            proxy_connect_timeout 60s;
            proxy_read_timeout 60s;

            # Буферы для больших данных
            proxy_buffer_size 16k;
            proxy_buffers 32 16k;
            proxy_busy_buffers_size 32k;
            proxy_max_temp_file_size 2048m;
        }

        # Корень API — редирект на frontend
        location = /api/ {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Фронтенд (Vue SPA)
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $server_name;
        }
    }
}